name: Upstream Sync

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: "0 0 1,16 * *" # twice a month, UTC
  workflow_dispatch:

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  open_sync_pr:
    name: Open upstream sync pull request
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare upstream sync branch
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/tangly1024/NotionNext.git
          git fetch origin main
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
            echo "No upstream commits to sync."
            exit 0
          fi

          git branch -f sync/upstream-main upstream/main
          git push --force-with-lease origin sync/upstream-main

          echo "needs_pr=true" >> "$GITHUB_OUTPUT"

      - name: Create or update sync pull request
        if: steps.sync.outputs.needs_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          title="Sync upstream main"
          body="This pull request updates this fork with the latest commits from tangly1024/NotionNext:main. It is opened instead of auto-merging into main so conflicts and upstream changes can be reviewed manually."

          pr_url="$(gh pr list \
            --base main \
            --head sync/upstream-main \
            --state open \
            --json url \
            --jq '.[0].url')"

          if [ -z "$pr_url" ]; then
            if ! gh pr create \
              --base main \
              --head sync/upstream-main \
              --title "$title" \
              --body "$body"; then
              echo "::warning::Could not create the upstream sync pull request. Check repository Actions workflow permissions, or open a pull request manually from sync/upstream-main to main."
              echo "The sync branch was pushed successfully: sync/upstream-main"
              exit 0
            fi
          else
            if ! gh pr edit "$pr_url" \
              --title "$title" \
              --body "$body"; then
              echo "::warning::Could not update the existing upstream sync pull request: $pr_url"
              exit 0
            fi
            echo "Updated existing pull request: $pr_url"
          fi
